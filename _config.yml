remote_theme: daattali/beautiful-jekyll@6.0.1

title: Christian Dorado
author: Christian Dorado
url-pretty: "sopechris.github.io"
title-on-all-pages: true

###############################################
# --- Navigation bar (CV style) --- #
###############################################

navbar-links:
  About Me: "aboutme"
  CV: "cv"
  Projects: "projects"
  Contact: "contact"

################
# --- Avatar --- #
################

avatar: "/images/christian.jpeg"
round-avatar: true

#####################################
# --- Social links (professional) --- #
#####################################

social-network-links:
  email: "sopechris@gmail.com"
  github: sopechris
  linkedin: christiandorado

#####################################
# --- General options --- #
#####################################

share-links-active:
  twitter: false
  facebook: false
  linkedin: true
  vk: false

post_search: false
edit_page_button: false
navbar-var-length: false

######################################
# --- Clean professional colours --- #
######################################

page-col: "#FFFFFF"
text-col: "#2E2E2E"
link-col: "#0A66C2"        # LinkedIn-like blue
hover-col: "#084B8A"

navbar-col: "#FFFFFF"
navbar-text-col: "#2E2E2E"
navbar-border-col: "#E5E5E5"

footer-col: "#FFFFFF"
footer-text-col: "#777777"
footer-link-col: "#2E2E2E"
footer-hover-col: "#0A66C2"

################
# --- Misc --- #
################

timezone: "Europe/Madrid"
markdown: kramdown
highlighter: rouge
permalink: /:title/

kramdown:
  input: GFM

#####################################
# --- Default layouts --- #
#####################################

defaults:
  -
    scope:
      path: ""
    values:
      layout: "page"

#####################################
# --- Exclusions --- #
#####################################

exclude:
  - CHANGELOG.md
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - docs/

#####################################
# --- Plugins --- #
#####################################

plugins:
  - jekyll-sitemap
